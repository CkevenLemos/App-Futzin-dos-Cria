workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 60

    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Build Android APK
        script: |
          npx expo export
          
    artifacts:
      - android/app/build/outputs/**/*.apk
